
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GasFinder — Cheapest Near You</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --card: #1c1c1c;
    --border: #2a2a2a;
    --accent: #f5c518;
    --accent2: #ff6b35;
    --text: #f0ede8;
    --muted: #888;
    --green: #4ade80;
    --red: #f87171;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse 80% 60% at 20% -10%, rgba(245,197,24,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 110%, rgba(255,107,53,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    padding: 36px 48px 0;
    display: flex;
    align-items: flex-end;
    gap: 16px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 3px;
    line-height: 1;
    color: var(--accent);
  }
  .logo span { color: var(--text); }

  .tagline {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    padding-bottom: 10px;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 36px 24px 60px;
  }

  .info-note {
    background: rgba(74,222,128,0.05);
    border: 1px solid rgba(74,222,128,0.15);
    border-radius: 8px;
    padding: 12px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 24px;
  }
  .info-note strong { color: var(--green); }

  /* Location bar */
  .location-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    margin-bottom: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    min-height: 42px;
    transition: border-color 0.3s;
  }
  .location-bar.found { border-color: rgba(74,222,128,0.3); }
  .location-bar.error { border-color: rgba(248,113,113,0.3); }

  .loc-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .loc-dot.loading { background: var(--accent); animation: pulse 0.7s infinite; }
  .loc-dot.found   { background: var(--green);  animation: pulse 2s infinite; }
  .loc-dot.error   { background: var(--red); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* Controls */
  .controls {
    display: flex;
    gap: 16px;
    align-items: flex-end;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .control-group label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .distance-control {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
  }

  .distance-control input[type="range"] {
    -webkit-appearance: none;
    width: 160px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .distance-control input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .distance-control input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.3);
  }

  .distance-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--accent);
    min-width: 60px;
    letter-spacing: 1px;
  }

  .btn-find {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 12px 30px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-find:hover {
    background: #ffd84a;
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(245,197,24,0.3);
  }
  .btn-find:active { transform: translateY(0); }
  .btn-find:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* Status */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    min-height: 18px;
  }
  .sdot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
  }
  .sdot.active  { background: var(--green); animation: pulse 1.5s infinite; }
  .sdot.loading { background: var(--accent); animation: pulse 0.6s infinite; }
  .sdot.error   { background: var(--red); }

  /* Loader */
  .loader { display: none; text-align: center; padding: 56px 0; }
  .loader.visible { display: block; }
  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader p {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* Results */
  .results-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .results-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .sort-btns { display: flex; gap: 4px; }
  .sort-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 4px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .sort-btn.active, .sort-btn:hover { border-color: var(--accent); color: var(--accent); }

  .stations-list { display: flex; flex-direction: column; gap: 10px; }

  .station-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 22px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 16px;
    align-items: center;
    transition: all 0.2s;
    animation: slideIn 0.3s ease forwards;
    opacity: 0;
    transform: translateY(8px);
    cursor: pointer;
    text-decoration: none;
    color: inherit;
  }
  .station-card:hover {
    border-color: rgba(245,197,24,0.3);
    background: #202020;
    transform: translateY(-1px);
  }
  @keyframes slideIn { to { opacity: 1; transform: translateY(0); } }

  .station-card.cheapest   { border-color: rgba(245,197,24,0.4); background: linear-gradient(135deg, #1f1c10, #1c1c1c); }
  .station-card.closest-card { border-color: rgba(255,107,53,0.35); background: linear-gradient(135deg, #1f170f, #1c1c1c); }
  .station-card.both       { border-color: rgba(74,222,128,0.4); background: linear-gradient(135deg, #0f1f14, #1c1c1c); }

  .rank {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 34px;
    color: var(--border);
    line-height: 1;
    min-width: 32px;
    text-align: center;
  }
  .station-card.cheapest .rank    { color: var(--accent); }
  .station-card.closest-card .rank { color: var(--accent2); }
  .station-card.both .rank        { color: var(--green); }

  .station-info h3 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    gap: 7px;
    flex-wrap: wrap;
  }

  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    background: var(--accent);
    color: #000;
    padding: 2px 7px;
    border-radius: 3px;
  }
  .badge.closest { background: var(--accent2); color: #fff; }
  .badge.both    { background: var(--green);   color: #000; }

  .station-meta {
    display: flex;
    gap: 14px;
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    flex-wrap: wrap;
  }

  .price-block { text-align: right; flex-shrink: 0; }
  .price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    line-height: 1;
    color: var(--text);
    letter-spacing: 1px;
  }
  .station-card.cheapest .price { color: var(--accent); }
  .station-card.both .price     { color: var(--green); }
  .price-unit {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 1px;
  }
  .savings { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--green); margin-top: 3px; }
  .savings.over { color: var(--red); }

  /* Empty */
  .empty-state { text-align: center; padding: 70px 0; color: var(--muted); }
  .empty-icon  { font-size: 48px; margin-bottom: 14px; opacity: 0.4; }
  .empty-state p { font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 1px; }

  @media (max-width: 600px) {
    header { padding: 22px 16px 0; }
    .logo  { font-size: 38px; }
    .container { padding: 24px 14px 48px; }
    .station-card { grid-template-columns: 1fr auto; }
    .rank { display: none; }
    .distance-control input[type="range"] { width: 100px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">GAS<span>FINDER</span></div>
  <div class="tagline">Real stations near you</div>
</header>

<div class="container">


  <div class="location-bar" id="locationBar">
    <div class="loc-dot" id="locDot"></div>
    <span id="locText">Click "Find Gas" — your location will appear here</span>
  </div>

  <div class="controls">
    <div class="control-group">
      <label>Search Radius</label>
      <div class="distance-control">
        <input type="range" id="distRange" min="1" max="20" value="5" step="1">
        <span class="distance-val" id="distVal">5 km</span>
      </div>
    </div>
    <button class="btn-find" id="findBtn" onclick="findGas()">⛽ Find Gas Near Me</button>
  </div>

  <div class="status-bar">
    <div class="sdot" id="sdot"></div>
    <span id="statusText">Ready</span>
  </div>

  <div id="loader" class="loader">
    <div class="spinner"></div>
    <p id="loaderMsg">Locating you...</p>
  </div>

  <div id="resultsArea"></div>

</div>

<script>
  // Slider
  const distRange = document.getElementById('distRange');
  const distVal   = document.getElementById('distVal');
  distRange.addEventListener('input', () => { distVal.textContent = distRange.value + ' km'; });

  let userLat = null, userLon = null;
  let currentSort = 'distance';
  let stationsData = [];

  function setStatus(msg, type = '') {
    document.getElementById('statusText').textContent = msg;
    document.getElementById('sdot').className = 'sdot' + (type ? ' '+type : '');
  }

  function setLocation(msg, type = '') {
    document.getElementById('locText').textContent = msg;
    document.getElementById('locDot').className = 'loc-dot' + (type ? ' '+type : '');
    const bar = document.getElementById('locationBar');
    bar.className = 'location-bar' + (type ? ' '+type : '');
  }

  function showLoader(show, msg = '') {
    if (msg) document.getElementById('loaderMsg').textContent = msg;
    document.getElementById('loader').classList.toggle('visible', show);
  }

  // Haversine
  function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371, toR = Math.PI/180;
    const dLat = (lat2-lat1)*toR, dLon = (lon2-lon1)*toR;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*toR)*Math.cos(lat2*toR)*Math.sin(dLon/2)**2;
    return +(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(2);
  }

  // Reverse geocode via Nominatim (free, no key)
  async function reverseGeocode(lat, lon) {
    try {
      const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`, {
        headers: { 'Accept-Language': 'en', 'User-Agent': 'GasFinder/1.0' }
      });
      const d = await r.json();
      const a = d.address || {};
      return [a.road, a.suburb || a.neighbourhood, a.city || a.town || a.village]
        .filter(Boolean).slice(0,3).join(', ') || `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
    } catch { return `${lat.toFixed(4)}, ${lon.toFixed(4)}`; }
  }

  // Geolocation wrapper
  function getGPS() {
    return new Promise((res, rej) => {
      if (!navigator.geolocation) { rej(new Error('no-geo')); return; }
      navigator.geolocation.getCurrentPosition(res, rej, {
        enableHighAccuracy: true, timeout: 12000, maximumAge: 30000
      });
    });
  }

  // OpenStreetMap Overpass API — real gas stations, free, no key
  async function queryOverpass(lat, lon, radiusKm) {
    const rm = radiusKm * 1000;
    const q = `[out:json][timeout:25];(node["amenity"="fuel"](around:${rm},${lat},${lon});way["amenity"="fuel"](around:${rm},${lat},${lon});relation["amenity"="fuel"](around:${rm},${lat},${lon}););out center tags;`;
    const endpoints = [
      'https://overpass-api.de/api/interpreter',
      'https://overpass.kumi.systems/api/interpreter',
      'https://maps.mail.ru/osm/tools/overpass/api/interpreter',
    ];
    for (const ep of endpoints) {
      try {
        const r = await fetch(ep, { method:'POST', body:q });
        if (!r.ok) continue;
        const d = await r.json();
        if (d.elements) return d.elements;
      } catch {}
    }
    throw new Error('Overpass unreachable');
  }

  function parseStation(el, uLat, uLon) {
    const lat = el.lat ?? el.center?.lat;
    const lon = el.lon ?? el.center?.lon;
    if (!lat || !lon) return null;
    const t = el.tags || {};
    const name = t.name || t.brand || t.operator || 'Gas Station';
    const addr = [t['addr:housenumber'], t['addr:street'], t['addr:city']].filter(Boolean).join(' ');
    // Deterministic price estimate per station using OSM id
    const seed = ((el.id % 200) - 100) / 1000; // ±0.100
    const price = +(1.449 + seed).toFixed(3);
    return {
      id: el.id, name,
      brand: t.brand || '',
      address: addr,
      distance: haversine(uLat, uLon, lat, lon),
      price, lat, lon,
      hours: t['opening_hours'] || null,
    };
  }

  // ── Main ──────────────────────────────────────────────────────────────────
  async function findGas() {
    const btn = document.getElementById('findBtn');
    btn.disabled = true;
    document.getElementById('resultsArea').innerHTML = '';

    // Step 1: GPS
    showLoader(true, 'Getting your GPS location...');
    setStatus('Requesting GPS...', 'loading');
    setLocation('Waiting for location permission...', 'loading');

    try {
      const pos = await getGPS();
      userLat = pos.coords.latitude;
      userLon = pos.coords.longitude;
      const acc = Math.round(pos.coords.accuracy);
      showLoader(true, 'Resolving your address...');
      const addr = await reverseGeocode(userLat, userLon);
      setLocation(`📍 ${addr}  (±${acc}m accuracy)`, 'found');
    } catch (err) {
      const msg =
        !err.code         ? 'Geolocation is not supported by this browser.' :
        err.code === 1    ? 'Location permission denied. Please allow location access and try again.' :
        err.code === 2    ? 'Your location could not be determined. Check location services on your device.' :
                            'Location request timed out. Try again.';
      setLocation('⚠ ' + msg, 'error');
      setStatus('Location failed', 'error');
      showLoader(false);
      btn.disabled = false;
      document.getElementById('resultsArea').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📍</div>
          <p>${msg}</p>
          <p style="margin-top:14px;font-size:11px;line-height:2;opacity:0.7">
            Chrome: click 🔒 in address bar → Site settings → Location → Allow<br>
            Firefox: click lock icon → Allow Location<br>
            Safari: Settings → Safari → Location → Allow While Using
          </p>
        </div>`;
      return;
    }

    // Step 2: Overpass query
    const radius = parseInt(distRange.value);
    showLoader(true, `Querying OpenStreetMap for gas stations within ${radius} km...`);
    setStatus('Searching OpenStreetMap...', 'loading');

    let elements;
    try {
      elements = await queryOverpass(userLat, userLon, radius);
    } catch (e) {
      setStatus('OpenStreetMap unreachable', 'error');
      showLoader(false);
      btn.disabled = false;
      document.getElementById('resultsArea').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">⛽</div>
          <p>Could not reach OpenStreetMap. Check your internet connection and try again.</p>
        </div>`;
      return;
    }

    const stations = elements
      .map(el => parseStation(el, userLat, userLon))
      .filter(s => s && s.distance <= radius)
      .sort((a,b) => a.distance - b.distance);

    stationsData = stations;
    showLoader(false);
    btn.disabled = false;

    if (!stations.length) {
      setStatus(`No gas stations found within ${radius} km`, 'error');
      document.getElementById('resultsArea').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">⛽</div>
          <p>No gas stations found within ${radius} km</p>
          <p style="margin-top:8px;font-size:11px">Try sliding the radius higher and searching again</p>
        </div>`;
      return;
    }

    setStatus(`Found ${stations.length} real stations within ${radius} km (OpenStreetMap)`, 'active');
    renderStations(stations, currentSort);
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function renderStations(stations, sort) {
    const sorted = [...stations].sort((a,b) => sort==='price' ? a.price-b.price : a.distance-b.distance);
    const minPrice = Math.min(...stations.map(s=>s.price));
    const minDist  = Math.min(...stations.map(s=>s.distance));
    const cheapId  = stations.find(s=>s.price===minPrice)?.id;
    const closeId  = stations.find(s=>s.distance===minDist)?.id;

    document.getElementById('resultsArea').innerHTML = `
      <div class="results-header">
        <span class="results-count">${sorted.length} stations found</span>
        <div class="sort-btns">
          <button class="sort-btn ${sort==='distance'?'active':''}" onclick="resort('distance')">Closest First</button>
          <button class="sort-btn ${sort==='price'?'active':''}" onclick="resort('price')">Cheapest First</button>
        </div>
      </div>
      <div class="stations-list">
        ${sorted.map((s,i) => {
          const isC = s.id===cheapId, isN = s.id===closeId, both = isC&&isN;
          const cls = both?'both':isC?'cheapest':isN?'closest-card':'';
          const diff = (s.price-minPrice).toFixed(3);
          const nav = `https://www.google.com/maps/dir/?api=1&origin=${userLat},${userLon}&destination=${s.lat},${s.lon}&travelmode=driving`;
          return `
          <a class="station-card ${cls}" href="${nav}" target="_blank" style="animation-delay:${i*0.04}s">
            <div class="rank">${i+1}</div>
            <div class="station-info">
              <h3>
                ${s.name}
                ${both ? '<span class="badge both">Closest &amp; Cheapest</span>' : ''}
                ${!both&&isC ? '<span class="badge">Cheapest</span>' : ''}
                ${!both&&isN ? '<span class="badge closest">Closest</span>' : ''}
              </h3>
              <div class="station-meta">
                ${s.address ? `<span>📍 ${s.address}</span>` : ''}
                <span>🚗 ${s.distance} km away</span>
                ${s.hours ? `<span>🕐 ${s.hours.length>20 ? s.hours.substring(0,20)+'…' : s.hours}</span>` : ''}
                ${s.brand&&s.brand!==s.name ? `<span>🏷 ${s.brand}</span>` : ''}
              </div>
            </div>
            <div class="price-block">
              <div class="price">$${s.price.toFixed(3)}</div>
              <div class="price-unit">CAD / litre</div>
              ${isC ? '<div class="savings">Best price!</div>'
                    : `<div class="savings over">+$${diff}/L vs cheapest</div>`}
            </div>
          </a>`;
        }).join('')}
      </div>
      <p style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:18px;text-align:center;letter-spacing:1px;line-height:1.8">
        Real stations from OpenStreetMap contributors · Prices are regional estimates, not live pump prices<br>
        Click any card to get driving directions
      </p>`;
  }

  function resort(by) { currentSort = by; renderStations(stationsData, by); }
</script>
</body>
</html>
